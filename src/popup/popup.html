<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <script src="../feature/openPage.js"></script>
</head>

<div id="mainPopup">
  <div class="title-bar">ShopifyToolkit</div>

  <div class="popup-inner">
    <div class="store-info">
      <p><span class="store-info-label">Store:</span> <span id="storeName" class="store-info-value">n/a</span></p>
      <p><span class="store-info-label">Theme:</span> <span id="themeName" class="store-info-value store-info-theme">n/a</span></p>
    </div>
    <button class="button-admin" title="Open root /admin page">Open Admin Home</button>
    <button class="button-resource" title="Open admin page for the current Page/Collection/Blog/Product">Open Page in Admin</button>
    <button class="button-theme-editor" title="Open theme editor for the current theme">Open Theme Editor</button>
    <button class="button-code-editor" title="Open Shopify's native code editor for the current theme">Open Code Editor</button>
    <button class="button-sidekick" title="Open SideKick chat in admin">Open SideKick chat</button>
    <button class="button-copy-trigger" title="Copy options">Copy</button>
  </div>

  <div class="copy-overlay" id="copyOverlay" hidden>
    <div class="copy-panel">
      <div class="copy-panel-header">
        <span class="copy-panel-title">Copy</span>
        <button class="copy-panel-close" type="button" title="Close" aria-label="Close"></button>
      </div>
      <button class="button-copy-theme-name" title="Copy window.Shopify.theme.name">Theme Name</button>
      <button class="button-copy-theme-id" title="Copy window.Shopify.theme.id">Theme ID</button>
      <button class="button-copy-theme-preview-url" title="Copy shop homepage URL with preview_theme_id">Theme Preview URL</button>
      <button class="button-copy-theme-editor-url" title="Copy theme editor URL for the current theme">Theme Editor URL</button>
    </div>
  </div>
</div>

<style type="text/css">
  #mainPopup {
    position: relative;
    width: 250px;
    background: #2d2d2d;
    font-family: Helvetica, Ubuntu, Arial, sans-serif;
  }

  .title-bar {
    background-color: #1e1e1e;
    font-size: 14px;
    text-align: center;
    padding: 2px;
  }

  body {
    margin: 0;
  }

  * {
    color: white;
  }

  .popup-inner {
    padding: 1em;
    padding-top: 0;
    padding-bottom: 0.5em;
  }

  .store-info {
    margin: 0.5em 0 0.75em;
    padding: 0.45em 0.55em;
    background: #252525;
    border-radius: 3px;
    border-left: 3px solid #95bf47;
  }

  .store-info p {
    margin: 0.1em 0;
    font-size: 11px;
    line-height: 1.45;
  }

  .store-info-label {
    color: #888;
  }

  .store-info-value {
    color: #ddd;
  }

  .store-info-theme {
    color: #8ec5ff;
  }

  button {
    width: 100%;
    background: darkgrey;
    border: none;
    margin-bottom: 5px;
  }

  .copy-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.75em;
    background: rgba(0, 0, 0, 0.65);
    box-sizing: border-box;
  }

  .copy-overlay[hidden] {
    display: none;
  }

  .copy-panel {
    width: 100%;
    background: #2d2d2d;
    border: 1px solid #555;
    padding: 0.75em;
    box-sizing: border-box;
  }

  .copy-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75em;
  }

  .copy-panel-title {
    font-size: 14px;
    font-weight: bold;
  }

  .copy-panel-close {
    position: relative;
    flex-shrink: 0;
    width: 1.5em;
    height: 1.5em;
    margin: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
  }

  .copy-panel-close::before,
  .copy-panel-close::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1em;
    height: 2px;
    background: white;
  }

  .copy-panel-close::before {
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .copy-panel-close::after {
    transform: translate(-50%, -50%) rotate(-45deg);
  }

  .copy-panel-close:hover {
    background: #444;
  }

  .copy-panel button:last-child {
    margin-bottom: 0;
  }
</style>
